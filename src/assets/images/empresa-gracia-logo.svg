<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Logo Empresa Garcia</title>
  <desc id="desc">Logo tipográfico con el texto Empresa Garcia</desc>

  <!-- Fondo -->
  <rect width="600" height="400" fill="#0f172a" />

  <!-- Marco -->
  <rect x="40" y="40" width="520" height="320" fill="none" stroke="#f97316" stroke-width="4" />

  <!-- Bloque de texto -->
  <rect x="80" y="130" width="440" height="140" fill="rgba(15,23,42,0.9)" stroke="#f97316" stroke-width="2" />

  <text x="300" y="190" text-anchor="middle" fill="#f9fafb"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="600" letter-spacing="6">
    EMPRESA
  </text>

  <text x="300" y="240" text-anchor="middle" fill="#f97316"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="40" font-weight="800" letter-spacing="8">
    GARCIA
  </text>
</svg>

